name: Fargate Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  #####################################
  # 1️⃣ Terraform & ECS Deploy for Dev
  #####################################
  deploy-dev:
    name: Deploy Dev Environment
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://example-dev-app.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.8.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1

      - name: Terraform Init (Dev)
        run: terraform init
        working-directory: ./environments/dev

      - name: Terraform Plan (Dev)
        run: terraform plan -out=tfplan
        working-directory: ./environments/dev

      - name: Terraform Apply (Dev)
        run: terraform apply -auto-approve tfplan
        working-directory: ./environments/dev

      - name: Build & Push Docker Images (Dev)
        run: |
          docker build -t patient-service ./microservices/patient-service
          docker tag patient-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:dev
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:dev

          docker build -t appointment-service ./microservices/appointment-service
          docker tag appointment-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:dev
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:dev

  #####################################
  # 2️⃣ Stage Deployment (Requires Approval)
  #####################################
  deploy-stage:
    name: Deploy Stage Environment
    runs-on: ubuntu-latest
    environment:
      name: stage
      url: https://example-stage-app.com
    needs: deploy-dev
    steps:
      - name: Await Approval
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          message: "Approve Stage Deployment"

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.8.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGE }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGE }}
          aws-region: us-east-1

      - name: Terraform Init (Stage)
        run: terraform init
        working-directory: ./environments/stage

      - name: Terraform Plan (Stage)
        run: terraform plan -out=tfplan
        working-directory: ./environments/stage

      - name: Terraform Apply (Stage)
        run: terraform apply -auto-approve tfplan
        working-directory: ./environments/stage

      - name: Build & Push Docker Images (Stage)
        run: |
          docker build -t patient-service ./microservices/patient-service
          docker tag patient-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:stage
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:stage

          docker build -t appointment-service ./microservices/appointment-service
          docker tag appointment-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:stage
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:stage

  #####################################
  # 3️⃣ Prod Deployment (Requires Approval)
  #####################################
  deploy-prod:
    name: Deploy Prod Environment
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://example-prod-app.com
    needs: deploy-stage
    steps:
      - name: Await Approval
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          message: "Approve Production Deployment"

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.8.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: Terraform Init (Prod)
        run: terraform init
        working-directory: ./environments/prod

      - name: Terraform Plan (Prod)
        run: terraform plan -out=tfplan
        working-directory: ./environments/prod

      - name: Terraform Apply (Prod)
        run: terraform apply -auto-approve tfplan
        working-directory: ./environments/prod

      - name: Build & Push Docker Images (Prod)
        run: |
          docker build -t patient-service ./microservices/patient-service
          docker tag patient-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:prod
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:prod

          docker build -t appointment-service ./microservices/appointment-service
          docker tag appointment-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:prod
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:prod
