name: Fargate Multi-Env Deployment

on:
  workflow_dispatch:

jobs:
  # -------------------------------
  # Dev Deployment (auto deploy)
  # -------------------------------
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.8.6

      - name: Configure AWS Credentials (Dev)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1

      # Terraform Steps
      - name: Terraform Init (Dev)
        run: terraform init
        working-directory: ./environments/dev

      - name: Terraform Plan (Dev)
        run: terraform plan -out=tfplan
        working-directory: ./environments/dev

      - name: Terraform Apply (Dev)
        run: terraform apply -auto-approve tfplan
        working-directory: ./environments/dev

      # Docker Steps
      - name: Log in to ECR (Dev)
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

      - name: Build & Push Patient Service Docker Image
        run: |
          docker build -t patient-service ./microservices/patient-service
          docker tag patient-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest

      - name: Build & Push Appointment Service Docker Image
        run: |
          docker build -t appointment-service ./microservices/appointment-service
          docker tag appointment-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest

  # -------------------------------
  # Stage Deployment (requires approval)
  # -------------------------------
  deploy-stage:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: stage
      url: https://stage.example.com
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Wait for manual approval
        uses: hmarr/auto-approve-action@v2
        if: github.event_name == 'workflow_dispatch'

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.8.6

      - name: Configure AWS Credentials (Stage)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGE }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGE }}
          aws-region: us-east-1

      - name: Terraform Init (Stage)
        run: terraform init
        working-directory: ./environments/stage

      - name: Terraform Plan (Stage)
        run: terraform plan -out=tfplan
        working-directory: ./environments/stage

      - name: Terraform Apply (Stage)
        run: terraform apply -auto-approve tfplan
        working-directory: ./environments/stage

      - name: Docker Login & Push (Stage)
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          docker build -t patient-service ./microservices/patient-service
          docker tag patient-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest
          docker build -t appointment-service ./microservices/appointment-service
          docker tag appointment-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest

  # -------------------------------
  # Prod Deployment (requires approval)
  # -------------------------------
  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment:
      name: prod
      url: https://prod.example.com
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Wait for manual approval
        uses: hmarr/auto-approve-action@v2
        if: github.event_name == 'workflow_dispatch'

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.8.6

      - name: Configure AWS Credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: Terraform Init (Prod)
        run: terraform init
        working-directory: ./environments/prod

      - name: Terraform Plan (Prod)
        run: terraform plan -out=tfplan
        working-directory: ./environments/prod

      - name: Terraform Apply (Prod)
        run: terraform apply -auto-approve tfplan
        working-directory: ./environments/prod

      - name: Docker Login & Push (Prod)
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          docker build -t patient-service ./microservices/patient-service
          docker tag patient-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest
          docker build -t appointment-service ./microservices/appointment-service
          docker tag appointment-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest
