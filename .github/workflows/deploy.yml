name: Deploy Fargate Microservices

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to deploy'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stage
          - prod

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.9   # Use a stable Terraform version

      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets['AWS_ACCESS_KEY_ID_' + github.event.inputs.environment] }}
          aws-secret-access-key: ${{ secrets['AWS_SECRET_ACCESS_KEY_' + github.event.inputs.environment] }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ./environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ./environments/${{ github.event.inputs.environment }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./environments/${{ github.event.inputs.environment }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply (Manual Approval)
        if: github.event.inputs.environment != 'dev'
        uses: hmarr/auto-approve-action@v2
        with:
          comment: 'Approving Terraform Apply for non-dev environment'
        # For stage/prod, use GitHub Environment Protection Rules to require approval

      - name: Terraform Apply (Dev)
        if: github.event.inputs.environment == 'dev'
        working-directory: ./environments/dev
        run: terraform apply -auto-approve tfplan

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: terraform
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets['AWS_ACCESS_KEY_ID_' + github.event.inputs.environment] }}
          aws-secret-access-key: ${{ secrets['AWS_SECRET_ACCESS_KEY_' + github.event.inputs.environment] }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Patient Service
        run: |
          docker build -t patient-service ./patient-service
          docker tag patient-service:latest ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/patient-service:latest

      - name: Build & Push Appointment Service
        run: |
          docker build -t appointment-service ./appointment-service
          docker tag appointment-service:latest ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/appointment-service:latest
